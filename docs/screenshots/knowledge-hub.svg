<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-label="DocAnchor Knowledge Hub screenshot preview">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f7fb"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f6cbd"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f20330f"/>
    </filter>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="320" height="820" fill="#0f1723"/>
  <rect x="0" y="0" width="320" height="820" fill="url(#bg)" opacity="0.03"/>
  <text x="28" y="56" fill="#e8eef7" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Workspace Control</text>
  <text x="28" y="84" fill="#c7d4e5" font-size="13" font-family="Segoe UI, Arial, sans-serif">Switch between persistent knowledge spaces</text>

  <rect x="24" y="110" width="272" height="44" rx="10" fill="#101b2a" stroke="#ffffff22"/>
  <text x="40" y="138" fill="#e8eef7" font-size="14" font-family="Segoe UI, Arial, sans-serif">Default Workspace</text>
  <text x="266" y="138" fill="#8fb0d8" font-size="14" font-family="Segoe UI, Arial, sans-serif">▾</text>

  <text x="28" y="206" fill="#e8eef7" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Knowledge Scope</text>
  <text x="28" y="234" fill="#c7d4e5" font-size="13" font-family="Segoe UI, Arial, sans-serif">Limit retrieval to selected files</text>
  <rect x="24" y="254" width="272" height="44" rx="10" fill="#101b2a" stroke="#ffffff22"/>
  <text x="40" y="282" fill="#c7d4e5" font-size="13" font-family="Segoe UI, Arial, sans-serif">Selected: 3 files</text>

  <rect x="24" y="330" width="272" height="46" rx="12" fill="#0f6cbd"/>
  <text x="40" y="360" fill="#ffffff" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Clear workspace knowledge</text>

  <!-- Main -->
  <rect x="360" y="48" width="1016" height="160" rx="24" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="404" y="94" fill="#ffffffcc" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="2">DOCANCHOR</text>
  <text x="404" y="142" fill="#ffffff" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Professional document Q&amp;A</text>
  <text x="404" y="170" fill="#ffffffdd" font-size="15" font-family="Segoe UI, Arial, sans-serif">Upload knowledge, index it by workspace, and get answers backed by evidence.</text>

  <!-- Stat cards -->
  <g filter="url(#shadow)">
    <rect x="360" y="236" width="240" height="120" rx="18" fill="#ffffff" opacity="0.96"/>
    <rect x="616" y="236" width="240" height="120" rx="18" fill="#ffffff" opacity="0.96"/>
    <rect x="872" y="236" width="240" height="120" rx="18" fill="#ffffff" opacity="0.96"/>
    <rect x="1128" y="236" width="248" height="120" rx="18" fill="#ffffff" opacity="0.96"/>
  </g>
  <text x="386" y="274" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">WORKSPACE</text>
  <text x="386" y="314" fill="#122033" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Default</text>
  <text x="642" y="274" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">DOCUMENTS</text>
  <text x="642" y="314" fill="#122033" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="800">12</text>
  <text x="898" y="274" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">TABLES</text>
  <text x="898" y="314" fill="#122033" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="800">2</text>
  <text x="1154" y="274" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">QUERY SCOPE</text>
  <text x="1154" y="314" fill="#122033" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="800">All files</text>

  <!-- Tabs -->
  <rect x="360" y="382" width="520" height="52" rx="26" fill="#ffffffb8" stroke="#12203314"/>
  <rect x="372" y="392" width="160" height="32" rx="16" fill="#ffffff" stroke="#12203314"/>
  <text x="404" y="413" fill="#122033" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Knowledge Hub</text>
  <text x="560" y="413" fill="#5b6b80" font-size="13" font-family="Segoe UI, Arial, sans-serif">Ask &amp; Analyze</text>
  <text x="688" y="413" fill="#5b6b80" font-size="13" font-family="Segoe UI, Arial, sans-serif">Evaluation Lab</text>

  <!-- Body cards -->
  <g filter="url(#shadow)">
    <rect x="360" y="456" width="470" height="328" rx="24" fill="#ffffff" opacity="0.96"/>
    <rect x="846" y="456" width="530" height="328" rx="24" fill="#ffffff" opacity="0.96"/>
  </g>

  <text x="388" y="504" fill="#122033" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Workspace readiness</text>
  <text x="388" y="528" fill="#5b6b80" font-size="13" font-family="Segoe UI, Arial, sans-serif">Quick operational view before you upload or ask.</text>
  <rect x="388" y="552" width="414" height="88" rx="16" fill="#eef3f8"/>
  <text x="408" y="584" fill="#122033" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Supported uploads</text>
  <text x="408" y="608" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif">PDF · Images · DOCX · HTML · JSON · CSV/TSV · XLSX</text>

  <text x="874" y="504" fill="#122033" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Upload and index</text>
  <text x="874" y="528" fill="#5b6b80" font-size="13" font-family="Segoe UI, Arial, sans-serif">Bring in documents and datasets for this workspace.</text>
  <rect x="874" y="554" width="474" height="56" rx="16" fill="#eef3f8"/>
  <text x="894" y="588" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif">Drop files here (multi-upload)</text>
  <rect x="874" y="626" width="474" height="48" rx="14" fill="#0f6cbd"/>
  <text x="894" y="656" fill="#ffffff" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Index uploaded files</text>

  <rect x="874" y="690" width="474" height="64" rx="16" fill="#ffffff" stroke="#12203314"/>
  <text x="894" y="720" fill="#122033" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Last run</text>
  <text x="894" y="742" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif">3 files indexed · 184 chunks</text>
</svg>
