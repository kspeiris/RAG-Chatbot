<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-label="DocAnchor Ask and Analyze screenshot preview">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f7fb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#0f6cbd"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f20330f"/>
    </filter>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="320" height="820" fill="#0f1723"/>
  <text x="28" y="60" fill="#e8eef7" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">DocAnchor</text>
  <text x="28" y="86" fill="#c7d4e5" font-size="13" font-family="Segoe UI, Arial, sans-serif">Workspace: Default</text>
  <rect x="24" y="112" width="272" height="44" rx="10" fill="#101b2a" stroke="#ffffff22"/>
  <text x="40" y="140" fill="#c7d4e5" font-size="13" font-family="Segoe UI, Arial, sans-serif">Scope: 3 selected files</text>

  <rect x="24" y="180" width="272" height="580" rx="18" fill="#101b2a" stroke="#ffffff22"/>
  <text x="40" y="218" fill="#e8eef7" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Diagnostics</text>
  <text x="40" y="248" fill="#8fb0d8" font-size="12" font-family="Segoe UI, Arial, sans-serif">Strict grounded mode</text>
  <text x="258" y="248" fill="#e8eef7" font-size="12" font-family="Segoe UI, Arial, sans-serif" text-anchor="end">true</text>
  <text x="40" y="276" fill="#8fb0d8" font-size="12" font-family="Segoe UI, Arial, sans-serif">Answer provider</text>
  <text x="258" y="276" fill="#e8eef7" font-size="12" font-family="Segoe UI, Arial, sans-serif" text-anchor="end">local</text>
  <text x="40" y="304" fill="#8fb0d8" font-size="12" font-family="Segoe UI, Arial, sans-serif">Reranker</text>
  <text x="258" y="304" fill="#e8eef7" font-size="12" font-family="Segoe UI, Arial, sans-serif" text-anchor="end">enabled</text>
  <text x="40" y="332" fill="#8fb0d8" font-size="12" font-family="Segoe UI, Arial, sans-serif">OCR</text>
  <text x="258" y="332" fill="#e8eef7" font-size="12" font-family="Segoe UI, Arial, sans-serif" text-anchor="end">eng</text>

  <!-- Header -->
  <rect x="360" y="48" width="1016" height="18" rx="9" fill="url(#accent)" opacity="0.9"/>
  <text x="360" y="106" fill="#122033" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="900">Ask &amp; Analyze</text>
  <text x="360" y="132" fill="#5b6b80" font-size="14" font-family="Segoe UI, Arial, sans-serif">Grounded answers with citations and structured table analytics.</text>

  <!-- Two-column layout -->
  <g filter="url(#shadow)">
    <rect x="360" y="168" width="610" height="616" rx="24" fill="#ffffff" opacity="0.96"/>
    <rect x="986" y="168" width="390" height="616" rx="24" fill="#ffffff" opacity="0.96"/>
  </g>

  <!-- Left: question form -->
  <text x="388" y="214" fill="#122033" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Grounded question workspace</text>
  <text x="388" y="238" fill="#5b6b80" font-size="13" font-family="Segoe UI, Arial, sans-serif">Ask about documents, OCR text, or registered tables.</text>

  <rect x="388" y="266" width="554" height="140" rx="16" fill="#eef3f8"/>
  <text x="408" y="296" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif">Example: “Which students are below 75% attendance?”</text>
  <text x="408" y="320" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif">Example: “What does the policy say about late submissions?”</text>

  <rect x="388" y="424" width="554" height="48" rx="14" fill="#0f6cbd"/>
  <text x="408" y="454" fill="#ffffff" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Get answer</text>

  <!-- Left: chat -->
  <text x="388" y="516" fill="#122033" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Conversation</text>
  <rect x="388" y="538" width="554" height="82" rx="16" fill="#ffffff" stroke="#12203314"/>
  <text x="410" y="570" fill="#122033" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">User</text>
  <text x="410" y="592" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif">Count orders per region in the spreadsheet.</text>

  <rect x="388" y="636" width="554" height="110" rx="16" fill="#ffffff" stroke="#12203314"/>
  <text x="410" y="668" fill="#122033" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Assistant</text>
  <text x="410" y="690" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif">The query returns 4 regions. Top region: West (182 orders).</text>
  <text x="410" y="712" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif">See row citations in the right panel.</text>

  <!-- Right: diagnostics -->
  <text x="1014" y="214" fill="#122033" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="800">Answer diagnostics</text>
  <text x="1014" y="238" fill="#5b6b80" font-size="13" font-family="Segoe UI, Arial, sans-serif">Route, confidence, status, citations.</text>

  <rect x="1014" y="266" width="334" height="92" rx="18" fill="#ffffff" stroke="#12203314"/>
  <text x="1036" y="298" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Route</text>
  <text x="1036" y="324" fill="#122033" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="900">structured</text>
  <text x="1230" y="298" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Confidence</text>
  <text x="1230" y="324" fill="#122033" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="900">High</text>

  <rect x="1014" y="374" width="334" height="86" rx="18" fill="#ffffff" stroke="#12203314"/>
  <text x="1036" y="406" fill="#5b6b80" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Citations</text>
  <text x="1036" y="432" fill="#122033" font-size="16" font-family="Segoe UI, Arial, sans-serif" font-weight="900">3</text>

  <rect x="1014" y="476" width="334" height="270" rx="18" fill="#ffffff" stroke="#12203314"/>
  <text x="1036" y="510" fill="#122033" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="900">Citations</text>
  <rect x="1036" y="530" width="290" height="56" rx="14" fill="#eef3f8"/>
  <text x="1052" y="560" fill="#122033" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">orders.xlsx [Sheet1]</text>
  <text x="1052" y="580" fill="#5b6b80" font-size="11" font-family="Segoe UI, Arial, sans-serif">row 12 · {"region":"West","orders":182}</text>

  <rect x="1036" y="598" width="290" height="56" rx="14" fill="#eef3f8"/>
  <text x="1052" y="628" fill="#122033" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">orders.xlsx [Sheet1]</text>
  <text x="1052" y="648" fill="#5b6b80" font-size="11" font-family="Segoe UI, Arial, sans-serif">row 19 · {"region":"East","orders":141}</text>

  <rect x="1036" y="666" width="290" height="56" rx="14" fill="#eef3f8"/>
  <text x="1052" y="696" fill="#122033" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">orders.xlsx [Sheet1]</text>
  <text x="1052" y="716" fill="#5b6b80" font-size="11" font-family="Segoe UI, Arial, sans-serif">row 27 · {"region":"South","orders":98}</text>
</svg>
